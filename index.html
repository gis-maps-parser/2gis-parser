<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Парсер 2ГИС</title>
  <meta name="description" content="Простая заглушка проекта 2gis-parser.">
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f7f4;
      --panel: #ffffff;
      --text: #17211b;
      --muted: #5f7067;
      --accent: #1f9d55;
      --accent-soft: #e6f5ed;
      --line: #d9e6de;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(130deg, rgba(31, 157, 85, 0.12), transparent 36%),
        linear-gradient(250deg, rgba(14, 116, 144, 0.08), transparent 34%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 6vw, 56px);
      box-shadow: 0 24px 70px rgba(23, 33, 27, 0.12);
    }

    .label {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      margin: 0 0 20px;
      padding: 6px 11px;
      border-radius: 8px;
      color: var(--accent);
      background: var(--accent-soft);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 8vw, 68px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    p {
      margin: 22px 0 0;
      max-width: 560px;
      color: var(--muted);
      font-size: clamp(17px, 2.7vw, 20px);
      line-height: 1.55;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 34px;
    }

    .status span {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: #254236;
      font-size: 14px;
      background: #f8fbf9;
    }
  </style>
</head>
<body>
  <main>
    <p class="label">2gis-parser</p>
    <h1>Парсер 2ГИС</h1>
    <p>Сайт проекта готовится к запуску. Здесь появится интерфейс для работы с данными 2ГИС.</p>
    <div class="status" aria-label="Статус проекта">
      <span>GitHub Pages</span>
      <span>Заглушка сайта</span>
      <span>gis-maps-parser</span>
    </div>
  </main>
</body>
</html>
